<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onderzoekstijd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --bg: #F6F7F9; --surface: #FFFFFF; --ink: #1B1D21; --muted: #6A6E76; --faint: #A2A7AF;
      --line: #E7E9ED; --line-strong: #D4D8DE;
      --accent: #3D5A80; --accent-ink: #2E4763; --accent-soft: #EAF0F7;
      --g-ink: #2E7D52; --g-bg: #E7F3EC; --a-ink: #A9750E; --a-bg: #FAF0DC; --r-ink: #C0413A; --r-bg: #FBE8E6;
      --radius-sm: 7px; --radius: 11px; --radius-lg: 16px;
      --shadow: 0 1px 2px rgba(20,24,32,.04), 0 4px 16px rgba(20,24,32,.04);
      --field-h: 38px; --label-h: 15px; --label-gap: 7px;
      --drawer-w: 720px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121317; --surface: #1B1D22; --ink: #E9EAED; --muted: #9A9EA6; --faint: #5C606A;
        --line: #292C33; --line-strong: #383C44;
        --accent: #7FA6CE; --accent-ink: #A9C5E2; --accent-soft: #21303F;
        --g-ink: #63C28F; --g-bg: #16271E; --a-ink: #DBA552; --a-bg: #2A2113; --r-ink: #E2837A; --r-bg: #2B1816;
        --shadow: 0 1px 2px rgba(0,0,0,.3), 0 4px 18px rgba(0,0,0,.25);
      }
    }

    body { font-family: var(--font-body); color: var(--ink); background: var(--bg); min-height: 100vh; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    .container { max-width: 1120px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

    /* Masthead */
    .masthead { display: flex; align-items: baseline; gap: .65rem; margin-bottom: .5rem; flex-wrap: wrap; }
    .wordmark { font-family: var(--font-display); font-weight: 700; font-size: 22px; letter-spacing: -.02em; }
    .wordmark .dot { color: var(--accent); }
    .tagline { font-size: 12.5px; color: var(--faint); }
    .sync { margin-left: auto; display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--muted); }
    .sync .state { display: inline-flex; align-items: center; gap: 6px; }
    .sync .state i { font-size: 15px; }
    .sync .state.ok i { color: var(--g-ink); }
    .sync .state.warn i { color: var(--a-ink); }
    .sync .state.bad i { color: var(--r-ink); }
    .sync .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .note { font-size: 12.5px; color: var(--muted); background: var(--accent-soft); border: 1px solid color-mix(in srgb, var(--accent) 18%, transparent); border-radius: var(--radius-sm); padding: 9px 12px; margin-bottom: 1.75rem; }

    /* Tabs */
    .nav { display: inline-flex; gap: 2px; padding: 3px; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); margin: 1.5rem 0 2rem; box-shadow: var(--shadow); }
    .nav-btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 16px; background: transparent; border: none; border-radius: 8px; cursor: pointer; font-size: 13.5px; font-weight: 500; color: var(--muted); font-family: var(--font-body); transition: background .15s, color .15s; }
    .nav-btn:hover { color: var(--ink); }
    .nav-btn.active { color: #fff; background: var(--accent); }
    .nav-btn i { font-size: 16px; }

    .screen { display: none; }
    .screen.active { display: block; animation: fade .22s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .head-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    h1 { font-family: var(--font-display); font-weight: 600; font-size: 19px; letter-spacing: -.01em; }
    .sec-title { font-family: var(--font-display); font-size: 14px; font-weight: 600; letter-spacing: .02em; text-transform: uppercase; color: var(--muted); margin: 1.75rem 0 .85rem; }

    label { font-size: 12.5px; font-weight: 500; color: var(--muted); display: block; margin-bottom: 5px; }

    input[type=text], input[type=month], input[type=number], select {
      width: 100%; padding: 0 11px; height: var(--field-h);
      border: 1px solid var(--line-strong); border-radius: var(--radius-sm);
      font-size: 14px; font-family: var(--font-body); background: var(--surface); color: var(--ink);
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    input::placeholder { color: var(--faint); }

    .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 1.4rem 1.5rem; margin-bottom: 1rem; box-shadow: var(--shadow); }

    .proj-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 1.05rem 1.4rem; margin-bottom: .7rem; display: flex; align-items: center; justify-content: space-between; transition: border-color .15s; box-shadow: var(--shadow); }
    .proj-card:hover { border-color: var(--line-strong); }
    .proj-name { font-family: var(--font-display); font-weight: 600; font-size: 15.5px; letter-spacing: -.01em; }
    .proj-dates { font-size: 12.5px; color: var(--muted); margin-top: 5px; font-variant-numeric: tabular-nums; }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }

    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border: 1px solid var(--line-strong); border-radius: var(--radius-sm); background: var(--surface); color: var(--ink); cursor: pointer; font-size: 13px; font-weight: 500; font-family: var(--font-body); transition: background .15s, border-color .15s, opacity .15s; }
    .btn:hover { background: var(--bg); border-color: var(--accent); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn:disabled:hover { background: var(--surface); border-color: var(--line-strong); }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent-ink); border-color: var(--accent-ink); }
    .btn-danger { color: var(--r-ink); border-color: transparent; background: transparent; }
    .btn-danger:hover { background: var(--r-bg); border-color: transparent; }
    .btn-ghost { border-color: transparent; background: transparent; color: var(--muted); }
    .btn-ghost:hover { background: var(--bg); border-color: transparent; color: var(--ink); }
    .btn-sm { padding: 6px 11px; font-size: 12.5px; }
    .btn-icon { padding: 0; width: 34px; height: 34px; justify-content: center; }
    .btn i { font-size: 15px; }

    /* Researcher row in project form */
    .rrow { display: grid; grid-template-columns: 200px 1fr auto; gap: 12px; align-items: start; margin-bottom: 9px; padding: 13px; background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius-sm); }
    .rrow .col-label { font-size: 11.5px; font-weight: 500; color: var(--muted); display: block; height: var(--label-h); line-height: var(--label-h); margin-bottom: var(--label-gap); white-space: nowrap; }
    .rrow .r-sel { height: var(--field-h); }
    .days-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .day-cell { display: flex; flex-direction: column; }
    .day-cell .col-label { text-align: center; font-variant-numeric: tabular-nums; }
    .day-cell .d-inp { width: 56px; height: var(--field-h); padding: 0 4px; text-align: center; font-size: 13px; font-variant-numeric: tabular-nums; }
    .rrow .del-col { padding-top: calc(var(--label-h) + var(--label-gap)); }
    .hint { display: flex; align-items: center; height: var(--field-h); font-size: 13px; color: var(--faint); }

    /* Researcher cards */
    .r-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 1rem 1.4rem; margin-bottom: .7rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: border-color .15s, box-shadow .15s; box-shadow: var(--shadow); }
    .r-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(61,90,128,.12); }
    .r-card .r-name { font-family: var(--font-display); font-weight: 600; font-size: 15px; letter-spacing: -.01em; }
    .r-card .r-meta { font-size: 12.5px; color: var(--muted); margin-top: 4px; }
    .r-card .r-chevron { color: var(--faint); font-size: 18px; transition: transform .2s; }
    .r-card:hover .r-chevron { color: var(--accent); }
    .r-card-actions { display: flex; gap: 6px; align-items: center; }

    /* Add researcher inline */
    .add-r-form { display: flex; gap: 10px; align-items: flex-end; padding: 1rem 1.4rem; background: var(--surface); border: 1px dashed var(--accent); border-radius: var(--radius); margin-bottom: .7rem; }
    .add-r-form > div { flex: 1; }

    .badge { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 100px; font-size: 11.5px; font-weight: 500; background: var(--accent-soft); color: var(--accent-ink); margin-left: 9px; vertical-align: middle; }
    .empty { color: var(--muted); font-size: 14px; padding: 3rem 2rem; text-align: center; border: 1px dashed var(--line-strong); border-radius: var(--radius-lg); }
    .empty .ti { font-size: 26px; display: block; margin-bottom: .6rem; color: var(--faint); }

    /* Filter bar */
    .filter-bar { display: flex; gap: 14px; align-items: flex-end; margin-bottom: 1.75rem; flex-wrap: wrap; padding: 1.1rem 1.3rem; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); box-shadow: var(--shadow); }
    .filter-bar > div { display: flex; flex-direction: column; gap: 5px; }
    .filter-bar input[type=month] { width: auto; }
    .filter-spacer { flex: 1; }
    .legend { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; margin-bottom: 1.1rem; font-size: 12px; color: var(--muted); }
    .legend .key { display: inline-flex; align-items: center; gap: 6px; }
    .legend .sw { width: 12px; height: 12px; border-radius: 4px; }

    /* Tables */
    .tbl-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--radius-lg); margin-bottom: 1.5rem; box-shadow: var(--shadow); }
    table { border-collapse: collapse; font-size: 13px; min-width: 100%; font-variant-numeric: tabular-nums; }
    thead th { padding: 11px 12px; color: var(--muted); font-weight: 600; font-size: 11.5px; letter-spacing: .03em; text-transform: uppercase; white-space: nowrap; background: var(--bg); border-bottom: 1px solid var(--line); text-align: center; }
    thead th.left { text-align: left; }
    td { padding: 9px 12px; border-bottom: 1px solid var(--line); white-space: nowrap; text-align: center; }
    td.left { text-align: left; font-weight: 500; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: color-mix(in srgb, var(--accent-soft) 45%, transparent); }
    .total-row td { font-weight: 600; background: var(--bg); border-top: 1.5px solid var(--line-strong); }
    .total-row:hover td { background: var(--bg); }
    .inactive { color: var(--faint); }
    .pill { display: inline-block; min-width: 30px; padding: 3px 9px; border-radius: 100px; font-weight: 600; font-size: 12.5px; }
    .c-green { color: var(--g-ink); background: var(--g-bg); }
    .c-amber { color: var(--a-ink); background: var(--a-bg); }
    .c-red   { color: var(--r-ink); background: var(--r-bg); }

    /* Drawer */
    .drawer-overlay { position: fixed; inset: 0; background: rgba(15,20,30,.38); backdrop-filter: blur(2px); z-index: 100; opacity: 0; pointer-events: none; transition: opacity .25s; }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }
    .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: var(--drawer-w); max-width: 95vw; background: var(--bg); border-left: 1px solid var(--line); box-shadow: -8px 0 40px rgba(0,0,0,.16); z-index: 101; display: flex; flex-direction: column; transform: translateX(100%); transition: transform .28s cubic-bezier(.4,0,.2,1); }
    .drawer.open { transform: translateX(0); }

    .drawer-head { padding: 1.5rem 1.5rem 1.35rem; border-bottom: 1px solid var(--line); flex-shrink: 0; background: var(--surface); }
    .drawer-head .top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .drawer-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
    .drawer-head h2 { font-family: var(--font-display); font-weight: 700; font-size: 21px; letter-spacing: -.02em; line-height: 1.15; }
    .drawer-summary { display: flex; gap: 12px; margin-top: 1.1rem; flex-wrap: wrap; }
    .drawer-stat { display: flex; flex-direction: column; gap: 1px; background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 9px 15px; min-width: 92px; }
    .drawer-stat .num { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
    .drawer-stat .lbl { font-size: 11.5px; color: var(--muted); }

    .drawer-body { overflow-y: auto; padding: 1.3rem 1.5rem 2rem; flex: 1; }
    .drawer.open .drawer-body { animation: fade .3s ease; }
    .proj-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .9rem; align-items: start; }
    .proj-block { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 1.1rem 1.2rem; box-shadow: var(--shadow); }
    .proj-block-head { display: flex; align-items: flex-start; gap: 11px; margin-bottom: .9rem; }
    .proj-block-icon { flex-shrink: 0; width: 34px; height: 34px; border-radius: 9px; background: var(--accent-soft); color: var(--accent-ink); display: flex; align-items: center; justify-content: center; font-size: 17px; }
    .proj-block-info { flex: 1; min-width: 0; }
    .proj-block-name { font-family: var(--font-display); font-weight: 600; font-size: 15px; letter-spacing: -.01em; }
    .proj-block-dates { font-size: 12px; color: var(--muted); margin-top: 2px; font-variant-numeric: tabular-nums; }
    .proj-block-total { flex-shrink: 0; text-align: right; }
    .proj-block-total .num { font-family: var(--font-display); font-weight: 700; font-size: 16px; font-variant-numeric: tabular-nums; }
    .proj-block-total .lbl { font-size: 10.5px; color: var(--muted); }
    .month-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 7px; }
    .month-chip { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 7px 4px; background: var(--bg); border-radius: 8px; }
    .month-chip .mlabel { font-size: 10.5px; font-weight: 500; color: var(--muted); font-variant-numeric: tabular-nums; }
    .empty-months { font-size: 12.5px; color: var(--faint); padding: 4px 0; }

    /* ---- Refinements ---- */
    .proj-card, .r-card { transition: transform .14s ease, border-color .15s, box-shadow .15s; }
    .proj-card:hover { transform: translateY(-1px); box-shadow: 0 5px 20px rgba(20,24,32,.08); }
    .r-card:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(1px); }
    .nav-btn.active { box-shadow: 0 2px 9px rgba(61,90,128,.28); }
    .add-r-form { animation: fade .2s ease; }

    /* Tables: solid surface, sticky name column, current-month accent */
    .tbl-wrap table { background: var(--surface); }
    thead th.left, td.left { position: sticky; left: 0; z-index: 1; background: var(--surface); box-shadow: 1px 0 0 var(--line); }
    thead th.left { z-index: 3; background: var(--bg); }
    tbody tr:hover td.left { background: color-mix(in srgb, var(--accent-soft) 45%, var(--surface)); }
    .total-row td.left { background: var(--bg); }
    th.cur { background: color-mix(in srgb, var(--accent-soft) 70%, transparent); color: var(--accent-ink); }
    td.cur { background: color-mix(in srgb, var(--accent-soft) 38%, transparent); }
    .total-row td.cur { background: color-mix(in srgb, var(--accent-soft) 60%, var(--bg)); }

    /* Toasts */
    .toast-wrap { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; }
    .toast { display: inline-flex; align-items: center; gap: 9px; background: var(--ink); color: var(--surface); font-size: 13px; font-weight: 500; padding: 11px 17px; border-radius: 100px; box-shadow: 0 8px 28px rgba(0,0,0,.2); opacity: 0; transform: translateY(10px); transition: opacity .22s, transform .22s; max-width: 90vw; }
    .toast.show { opacity: 1; transform: none; }
    .toast i { font-size: 16px; }
    .toast.ok i { color: #7BE0A8; }
    .toast.error { background: var(--r-ink); color: #fff; }

    /* Easier month pickers */
    input[type=month] { cursor: pointer; }
    input[type=month]::-webkit-calendar-picker-indicator { cursor: pointer; padding: 7px; margin-left: 2px; border-radius: 5px; opacity: .6; transition: opacity .15s, background .15s; }
    input[type=month]:hover::-webkit-calendar-picker-indicator { opacity: 1; background: var(--accent-soft); }
    .filter-bar input[type=month] { min-width: 152px; }
    .row2 input[type=month] { width: 100%; }

    @media (max-width: 560px) {
      .rrow { grid-template-columns: 1fr auto; }
      .head-row { flex-direction: column; align-items: stretch; gap: .75rem; }
      .drawer { width: 100%; }
      .proj-grid { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) { .screen.active, .spin { animation: none; } * { transition: none !important; } }
  </style>
</head>
<body>
<div class="container">
  <div class="masthead">
    <span class="wordmark">Onderzoekstijd<span class="dot">.</span></span>
    <span class="tagline">capaciteitsplanning per project</span>
    <div class="sync" id="sync"></div>
  </div>
  <div id="cloud-note" class="note" style="display:none"></div>

  <div class="nav">
    <button class="nav-btn active"  onclick="showScreen('projects',this)"><i class="ti ti-folder"></i> Projecten</button>
    <button class="nav-btn"         onclick="showScreen('researchers',this)"><i class="ti ti-users"></i> Onderzoekers</button>
    <button class="nav-btn"         onclick="showScreen('overview',this)"><i class="ti ti-layout-grid"></i> Overzicht</button>
  </div>

  <!-- PROJECTEN -->
  <div id="screen-projects" class="screen active">
    <div class="head-row">
      <h1>Projecten</h1>
      <button class="btn btn-primary" onclick="openNew()"><i class="ti ti-plus"></i> Nieuw project</button>
    </div>
    <div id="proj-list"></div>
    <div id="form-home">
    <div id="proj-form" style="display:none">
      <div class="card">
        <h1 id="form-title" style="margin-bottom:1.1rem">Nieuw project</h1>
        <div style="margin-bottom:14px"><label>Projectnaam</label><input type="text" id="p-name" placeholder="Bijv. Klimaatadaptatie stedelijk gebied"></div>
        <div class="row2">
          <div><label>Startmaand</label><input type="month" id="p-start" onchange="rebuildMonthInputs()"></div>
          <div><label>Eindmaand</label>  <input type="month" id="p-end"   onchange="rebuildMonthInputs()"></div>
        </div>
        <div class="head-row" style="margin:1.4rem 0 .7rem">
          <span class="sec-title" style="margin:0">Onderzoekers &amp; dagen per maand</span>
          <button class="btn btn-sm" id="add-r-btn" onclick="addRRow()"><i class="ti ti-plus"></i> Onderzoeker</button>
        </div>
        <div id="r-rows"></div>
        <div style="display:flex;gap:9px;margin-top:1.3rem;justify-content:flex-end">
          <button class="btn btn-ghost" onclick="cancelForm()">Annuleren</button>
          <button class="btn btn-primary" onclick="saveProject()"><i class="ti ti-check"></i> Opslaan</button>
        </div>
      </div>
    </div>
    </div>
  </div>

  <!-- ONDERZOEKERS -->
  <div id="screen-researchers" class="screen">
    <div class="head-row">
      <h1>Onderzoekers</h1>
      <button class="btn btn-primary" onclick="toggleAddRForm()"><i class="ti ti-plus"></i> Onderzoeker</button>
    </div>
    <div id="add-r-form-wrap" style="display:none">
      <div class="card">
        <h1 id="r-form-title" style="margin-bottom:1.1rem">Onderzoeker toevoegen</h1>
        <div class="row2">
          <div><label>Naam</label><input type="text" id="new-r-name" placeholder="Volledige naam" onkeydown="if(event.key==='Enter')saveResearcher()"></div>
          <div><label>Werkdagen per week</label><input type="number" id="r-dpw" min="0" max="7" step="0.5" placeholder="bijv. 5"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px">
          <div><label>Prof. ontwikkeling (dagen/mnd)</label><input type="number" id="r-dev" min="0" step="0.5" placeholder="0"></div>
          <div><label>Organisatiewerk (dagen/mnd)</label><input type="number" id="r-org" min="0" step="0.5" placeholder="0"></div>
          <div><label>Acquisitie (dagen/mnd)</label><input type="number" id="r-acq" min="0" step="0.5" placeholder="0"></div>
        </div>
        <div class="head-row" style="margin:1.25rem 0 .6rem">
          <span class="sec-title" style="margin:0">Onderwijsprojecten (dagen/mnd)</span>
          <button class="btn btn-sm" onclick="addEduRow()"><i class="ti ti-plus"></i> Onderwijsproject</button>
        </div>
        <div id="r-edu-rows"></div>
        <div style="display:flex;gap:9px;margin-top:1.2rem;justify-content:flex-end">
          <button class="btn btn-ghost" onclick="closeResearcherForm()">Annuleren</button>
          <button class="btn btn-primary" onclick="saveResearcher()"><i class="ti ti-check"></i> Opslaan</button>
        </div>
      </div>
    </div>
    <div id="r-list"></div>
  </div>

  <!-- OVERZICHT -->
  <div id="screen-overview" class="screen">
    <div class="head-row"><h1>Overzicht</h1></div>
    <div class="filter-bar">
      <div><label>Van</label>       <input type="month" id="ov-from" onchange="renderOverview()"></div>
      <div><label>Tot en met</label><input type="month" id="ov-to"   onchange="renderOverview()"></div>
      <div class="filter-spacer"></div>
      <div><button class="btn btn-sm" onclick="resetRange()">Huidig jaar</button></div>
      <div><button class="btn btn-sm" onclick="nextYear()">Volgend jaar</button></div>
    </div>
    <div id="ov-content"></div>
  </div>
</div>

<!-- DRAWER -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div class="top">
      <div>
        <div class="drawer-eyebrow">Onderzoeker</div>
        <h2 id="drawer-name"></h2>
      </div>
      <button class="btn btn-icon btn-ghost" onclick="closeDrawer()"><i class="ti ti-x"></i></button>
    </div>
    <div class="drawer-summary" id="drawer-summary"></div>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<!-- TOASTS -->
<div class="toast-wrap" id="toast-wrap"></div>

<script>
/* ============================================================
   CONFIG — vul in voor cloud-opslag (JSONBin.io)
   ============================================================ */
const CONFIG = { binId: '6a34f0c8da38895dfedc0a9f', key: '$2a$10$cKm/UhNRgJv4MW6A4ZVrYOeu987d63rnZpgUcLDfkClpWQpxw/NES' };
const USE_CLOUD = !!(CONFIG.binId && CONFIG.key);
const API = `https://api.jsonbin.io/v3/b/${CONFIG.binId}`;

const MONTHS = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
let projects    = [];
let researchers = [];
let editId = null;

const now = new Date();
const CY = now.getFullYear(), CM = now.getMonth() + 1;
const DEFAULT_FROM = `${CY}-${String(CM).padStart(2,'0')}`;
const DEFAULT_TO   = `${CY}-12`;

/* ---- helpers ---- */
function getMonths(start, end) {
  if (!start || !end || start > end) return [];
  const ms = []; let [sy,sm] = start.split('-').map(Number); const [ey,em] = end.split('-').map(Number);
  while (sy < ey || (sy === ey && sm <= em)) { ms.push(`${sy}-${String(sm).padStart(2,'0')}`); sm++; if (sm > 12) { sm = 1; sy++; } }
  return ms;
}
function fmtYM(ym) { if (!ym) return ''; const [y,m] = ym.split('-'); return `${MONTHS[parseInt(m)-1]} '${String(y).slice(2)}`; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function dayClass(d) { if (!d) return ''; if (d <= 10) return 'c-green'; if (d <= 15) return 'c-amber'; return 'c-red'; }
function shortName(name) { return name.length > 12 ? name.slice(0, 12) + '…' : name; }
function fmtNum(n) { const r = Math.round(n * 10) / 10; return Number.isInteger(r) ? String(r) : r.toFixed(1); }
function monthlyWork(r) { const dpw = (r.daysPerWeek != null) ? r.daysPerWeek : 5; return dpw * 52 / 12; }
function fixedMonthly(r) { return (r.devDays||0) + (r.orgDays||0) + (r.acqDays||0) + ((r.eduProjects||[]).reduce((s,e)=>s+(e.days||0),0)); }
function availClass(a) { if (a >= 5) return 'c-green'; if (a >= 2) return 'c-amber'; return 'c-red'; }
function rName(id) { const r = researchers.find(x => x.id === id); return r ? r.name : `Onderzoeker ${id}`; }
const CUR_YM = DEFAULT_FROM;

function showToast(msg, type) {
  const wrap = document.getElementById('toast-wrap'); if (!wrap) return;
  const t = document.createElement('div');
  t.className = 'toast ' + (type || 'ok');
  const icon = type === 'error' ? 'ti-alert-circle' : 'ti-check';
  t.innerHTML = `<i class="ti ${icon}"></i> ${esc(msg)}`;
  wrap.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 250); }, 2400);
}

/* ---- sync ---- */
function setStatus(s) {
  const el = document.getElementById('sync'); if (!el) return;
  const map = { local:['ti-device-laptop','Lokaal opgeslagen',''], syncing:['ti-loader-2 spin','Synchroniseren…',''], synced:['ti-cloud-check','Online opgeslagen','ok'], offline:['ti-cloud-off','Offline – lokaal bewaard','warn'], error:['ti-alert-triangle','Opslaan mislukt','bad'] };
  const [icon, text, cls] = map[s] || map.local;
  const refresh = USE_CLOUD ? `<button class="btn btn-icon btn-ghost" title="Vernieuwen" onclick="pull()"><i class="ti ti-refresh"></i></button>` : '';
  el.innerHTML = `<span class="state ${cls}"><i class="ti ${icon}"></i> ${text}</span>${refresh}`;
}

function load() {
  try { const raw = localStorage.getItem('ot_data'); if (raw) { const d = JSON.parse(raw); projects = d.projects || []; researchers = d.researchers || []; } } catch(e) {}
  renderList(); renderRList();
  const note = document.getElementById('cloud-note');
  if (USE_CLOUD) { pull(); }
  else { setStatus('local'); note.style.display = 'block'; note.innerHTML = '<b>Alleen lokaal opgeslagen.</b> Vul de JSONBin-gegevens in <code>index.html</code> in om data te delen tussen computers.'; }
}

async function pull() {
  if (!USE_CLOUD) return;
  setStatus('syncing');
  try {
    const res = await fetch(`${API}/latest`, { headers: { 'X-Master-Key': CONFIG.key, 'X-Bin-Meta': 'false' } });
    if (!res.ok) throw new Error();
    const rec = await res.json();
    const d = rec.record || rec;
    projects = d.projects || []; researchers = d.researchers || [];
    saveLocal(); renderList(); renderRList();
    if (document.getElementById('screen-overview').classList.contains('active')) renderOverview();
    setStatus('synced');
  } catch(e) { setStatus('offline'); }
}

function saveLocal() { try { localStorage.setItem('ot_data', JSON.stringify({ projects, researchers })); } catch(e) {} }

async function save() {
  saveLocal();
  if (!USE_CLOUD) { setStatus('local'); return; }
  setStatus('syncing');
  try {
    const res = await fetch(API, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': CONFIG.key }, body: JSON.stringify({ projects, researchers }) });
    setStatus(res.ok ? 'synced' : 'error');
  } catch(e) { setStatus('offline'); }
}

/* ---- navigation ---- */
function showScreen(s, btn) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('screen-' + s).classList.add('active');
  btn.classList.add('active');
  if (s === 'overview') { initRangeIfEmpty(); renderOverview(); }
  if (s === 'researchers') renderRList();
}

function initRangeIfEmpty() {
  const f = document.getElementById('ov-from'); const t = document.getElementById('ov-to');
  if (!f.value) f.value = DEFAULT_FROM; if (!t.value) t.value = DEFAULT_TO;
}
function resetRange() { document.getElementById('ov-from').value = DEFAULT_FROM; document.getElementById('ov-to').value = DEFAULT_TO; renderOverview(); }
function nextYear()   { const ny = CY+1; document.getElementById('ov-from').value = `${ny}-01`; document.getElementById('ov-to').value = `${ny}-12`; renderOverview(); }

/* ===== ONDERZOEKERS ===== */
let editRId = null;

function openResearcherForm(id) {
  editRId = id || null;
  const r = id ? researchers.find(x => x.id === id) : null;
  document.getElementById('r-form-title').textContent = id ? 'Onderzoeker bewerken' : 'Onderzoeker toevoegen';
  document.getElementById('new-r-name').value = r ? r.name : '';
  document.getElementById('r-dpw').value = (r && r.daysPerWeek != null) ? r.daysPerWeek : '';
  document.getElementById('r-dev').value = (r && r.devDays != null) ? r.devDays : '';
  document.getElementById('r-org').value = (r && r.orgDays != null) ? r.orgDays : '';
  document.getElementById('r-acq').value = (r && r.acqDays != null) ? r.acqDays : '';
  document.getElementById('r-edu-rows').innerHTML = '';
  if (r && r.eduProjects) r.eduProjects.forEach(e => addEduRow(e));
  const w = document.getElementById('add-r-form-wrap');
  w.style.display = 'block';
  w.scrollIntoView({ behavior: 'smooth', block: 'start' });
  setTimeout(() => document.getElementById('new-r-name').focus(), 60);
}

function closeResearcherForm() { document.getElementById('add-r-form-wrap').style.display = 'none'; editRId = null; }

function toggleAddRForm() {
  const w = document.getElementById('add-r-form-wrap');
  if (w.style.display !== 'none') closeResearcherForm(); else openResearcherForm();
}

function addEduRow(data) {
  const div = document.createElement('div'); div.className = 'edu-row';
  div.style = 'display:grid;grid-template-columns:1fr 120px auto;gap:10px;align-items:end;margin-bottom:8px';
  div.innerHTML = `
    <div><label>Naam</label><input type="text" class="edu-name" placeholder="Bijv. Vak bestuurskunde" value="${data ? esc(data.name) : ''}"></div>
    <div><label>Dagen/mnd</label><input type="number" class="edu-days" min="0" step="0.5" placeholder="0" value="${data && data.days != null ? data.days : ''}"></div>
    <div><button class="btn btn-icon btn-danger" title="Verwijderen" onclick="this.closest('.edu-row').remove()"><i class="ti ti-trash"></i></button></div>`;
  document.getElementById('r-edu-rows').appendChild(div);
}

function saveResearcher() {
  const name = document.getElementById('new-r-name').value.trim();
  if (!name) { showToast('Vul een naam in.', 'error'); return; }
  if (researchers.find(r => r.name.toLowerCase() === name.toLowerCase() && r.id !== editRId)) { showToast('Deze naam bestaat al.', 'error'); return; }
  const num = id => { const v = parseFloat(document.getElementById(id).value); return isNaN(v) ? 0 : v; };
  const dpwRaw = document.getElementById('r-dpw').value;
  const daysPerWeek = dpwRaw === '' ? 5 : parseFloat(dpwRaw);
  const eduProjects = [...document.querySelectorAll('.edu-row')].map(row => ({
    name: row.querySelector('.edu-name').value.trim() || 'Onderwijs',
    days: parseFloat(row.querySelector('.edu-days').value) || 0
  })).filter(e => e.days > 0);
  const data = { name, daysPerWeek, devDays: num('r-dev'), orgDays: num('r-org'), acqDays: num('r-acq'), eduProjects };
  if (editRId) { Object.assign(researchers.find(x => x.id === editRId), data); }
  else { researchers.push({ id: Date.now(), ...data }); }
  save(); renderRList(); closeResearcherForm();
  showToast(editRId ? 'Onderzoeker bijgewerkt' : 'Onderzoeker toegevoegd');
}

function deleteResearcher(id) {
  const used = projects.some(p => p.researchers.some(r => r.id === id));
  if (used) { showToast('Onderzoeker is gekoppeld aan een project.', 'error'); return; }
  if (!confirm('Onderzoeker verwijderen?')) return;
  researchers = researchers.filter(r => r.id !== id);
  save(); renderRList();
}

function renderRList() {
  const el = document.getElementById('r-list'); if (!el) return;
  if (!researchers.length) { el.innerHTML = '<div class="empty"><i class="ti ti-users"></i>Nog geen onderzoekers. Voeg de eerste toe.</div>'; return; }
  el.innerHTML = researchers.map(r => {
    const projCount = projects.filter(p => p.researchers.some(x => x.id === r.id)).length;
    const dpw = (r.daysPerWeek != null) ? r.daysPerWeek : 5;
    return `<div class="r-card" onclick="openDrawer(${r.id})">
      <div style="flex:1;min-width:0">
        <div class="r-name">${esc(r.name)}</div>
        <div class="r-meta">${fmtNum(dpw)} dagen/week · ${projCount} project${projCount !== 1 ? 'en' : ''}</div>
      </div>
      <div class="r-card-actions" onclick="event.stopPropagation()">
        <button class="btn btn-icon btn-ghost" title="Bewerken" onclick="openResearcherForm(${r.id})"><i class="ti ti-pencil"></i></button>
        <button class="btn btn-icon btn-danger" title="Verwijderen" onclick="deleteResearcher(${r.id})"><i class="ti ti-trash"></i></button>
      </div>
      <i class="ti ti-chevron-right r-chevron" style="margin-left:10px"></i>
    </div>`;
  }).join('');
}

/* ===== DRAWER ===== */
function openDrawer(rid) {
  const r = researchers.find(x => x.id === rid); if (!r) return;
  document.getElementById('drawer-name').textContent = r.name;

  const involved = projects.filter(p => p.researchers.some(x => x.id === rid));
  const body = document.getElementById('drawer-body');
  const summary = document.getElementById('drawer-summary');
  const dpw = (r.daysPerWeek != null) ? r.daysPerWeek : 5;

  summary.innerHTML = `
    <div class="drawer-stat"><span class="num">${fmtNum(dpw)}</span><span class="lbl">werkdagen/week</span></div>
    <div class="drawer-stat"><span class="num">${fmtNum(r.devDays||0)}</span><span class="lbl">ontwikkeling/mnd</span></div>
    <div class="drawer-stat"><span class="num">${fmtNum(r.orgDays||0)}</span><span class="lbl">organisatie/mnd</span></div>
    <div class="drawer-stat"><span class="num">${fmtNum(r.acqDays||0)}</span><span class="lbl">acquisitie/mnd</span></div>`;

  let html = '';

  // Onderwijsprojecten (vaste dagen per maand)
  const edu = r.eduProjects || [];
  if (edu.length) {
    html += `<div class="sec-title" style="margin-top:0">Onderwijsprojecten · dagen/maand</div>`;
    html += `<div class="tbl-wrap" style="margin-bottom:1.5rem"><table><thead><tr><th class="left">Onderwijsproject</th><th>Dagen/mnd</th></tr></thead><tbody>`;
    edu.forEach(e => { html += `<tr><td class="left">${esc(e.name)}</td><td>${fmtNum(e.days)}</td></tr>`; });
    const eduTot = edu.reduce((s, e) => s + (e.days || 0), 0);
    html += `<tr class="total-row"><td class="left">Totaal</td><td>${fmtNum(eduTot)}</td></tr>`;
    html += `</tbody></table></div>`;
  }

  // Onderzoeksprojecten
  html += `<div class="sec-title"${edu.length ? '' : ' style="margin-top:0"'}>Onderzoeksprojecten</div>`;
  if (!involved.length) {
    html += '<div class="empty"><i class="ti ti-folder-off"></i>Nog niet gekoppeld aan een onderzoeksproject.</div>';
  } else {
    // Overzicht: totale projecttijd per maand
    const allMonths = [...new Set(involved.flatMap(p => {
      const rdata = p.researchers.find(x => x.id === rid);
      return Object.keys(rdata.days || {}).filter(m => rdata.days[m]);
    }))].sort();
    if (allMonths.length) {
      const mTot = {}; allMonths.forEach(m => mTot[m] = 0);
      involved.forEach(p => {
        const rdata = p.researchers.find(x => x.id === rid);
        allMonths.forEach(m => { if (rdata.days && rdata.days[m]) mTot[m] += rdata.days[m]; });
      });
      html += `<div class="tbl-wrap" style="margin-bottom:1.5rem"><table><thead><tr>${allMonths.map(m=>`<th>${fmtYM(m)}</th>`).join('')}</tr></thead><tbody><tr>${allMonths.map(m=>{const d=mTot[m]||0;return `<td>${d>0?`<span class="pill ${dayClass(d)}">${d}</span>`:''}</td>`;}).join('')}</tr></tbody></table></div>`;
    }

    html += `<div class="proj-grid">`;
    involved.forEach(p => {
      const rdata = p.researchers.find(x => x.id === rid);
      const months = getMonths(p.start, p.end);
      const monthsWithDays = months.filter(m => rdata.days && rdata.days[m]);
      const total = monthsWithDays.reduce((s, m) => s + (rdata.days[m] || 0), 0);

      html += `<div class="proj-block">
        <div class="proj-block-head">
          <div class="proj-block-icon"><i class="ti ti-folder"></i></div>
          <div class="proj-block-info">
            <div class="proj-block-name" title="${esc(p.name)}">${esc(shortName(p.name))}</div>
            <div class="proj-block-dates">${fmtYM(p.start)} – ${fmtYM(p.end)}</div>
          </div>
          <div class="proj-block-total"><div class="num">${total}</div><div class="lbl">dag${total !== 1 ? 'en' : ''}</div></div>
        </div>`;
      if (monthsWithDays.length) {
        html += `<div class="month-list">`;
        monthsWithDays.forEach(m => {
          const d = rdata.days[m];
          html += `<div class="month-chip"><span class="mlabel">${fmtYM(m)}</span><span class="pill ${dayClass(d)}">${d}</span></div>`;
        });
        html += `</div>`;
      } else {
        html += `<div class="empty-months">Nog geen dagen ingevuld.</div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  }
  body.innerHTML = html;

  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (document.getElementById('drawer').classList.contains('open')) { closeDrawer(); return; }
  const pf = document.getElementById('proj-form'); if (pf && pf.style.display !== 'none') { cancelForm(); return; }
  const af = document.getElementById('add-r-form-wrap'); if (af && af.style.display !== 'none') { toggleAddRForm(); }
});

/* ===== PROJECTEN ===== */
function getUsedIds() { return [...document.querySelectorAll('.r-sel')].map(s => parseInt(s.value)); }

function getAvailableOpts(currentId) {
  const used = getUsedIds();
  if (!researchers.length) return `<option value="">— geen onderzoekers —</option>`;
  return researchers.map(r => {
    const dis = used.includes(r.id) && r.id !== currentId;
    return `<option value="${r.id}"${r.id === currentId ? ' selected' : ''}${dis ? ' disabled' : ''}>${esc(r.name)}</option>`;
  }).join('');
}

function refreshAllSelects() {
  document.querySelectorAll('.r-sel').forEach(sel => { const cur = parseInt(sel.value); sel.innerHTML = getAvailableOpts(cur); });
  updateAddBtn();
}

function updateAddBtn() {
  const btn = document.getElementById('add-r-btn'); if (!btn) return;
  btn.disabled = !researchers.length || getUsedIds().length >= researchers.length;
}

function openNew() {
  editId = null;
  homeForm();
  document.getElementById('form-title').textContent = 'Nieuw project';
  document.getElementById('p-name').value = '';
  document.getElementById('p-start').value = '';
  document.getElementById('p-end').value = '';
  document.getElementById('r-rows').innerHTML = '';
  document.getElementById('proj-form').style.display = 'block';
  updateAddBtn();
  document.getElementById('proj-form').scrollIntoView({ behavior: 'smooth', block: 'start' });
  setTimeout(() => document.getElementById('p-name').focus(), 60);
}

function openEdit(id) {
  const p = projects.find(x => x.id === id); if (!p) return;
  editId = id;
  document.getElementById('form-title').textContent = 'Project bewerken';
  document.getElementById('p-name').value  = p.name;
  document.getElementById('p-start').value = p.start;
  document.getElementById('p-end').value   = p.end;
  document.getElementById('r-rows').innerHTML = '';
  p.researchers.forEach(r => addRRow(r));
  const form = document.getElementById('proj-form');
  const card = document.querySelector(`.proj-card[data-id="${id}"]`);
  if (card) card.insertAdjacentElement('afterend', form); else homeForm();
  form.style.display = 'block';
  form.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function cancelForm() { document.getElementById('proj-form').style.display = 'none'; homeForm(); }

function dayInputsHtml(months, lookup) {
  return months.map(ym => {
    const val = (lookup && lookup[ym] != null) ? lookup[ym] : '';
    return `<div class="day-cell"><span class="col-label">${fmtYM(ym)}</span><input type="number" class="d-inp" data-ym="${ym}" min="0" max="31" step="0.5" value="${val}"></div>`;
  }).join('');
}

function addRRow(data) {
  if (!researchers.length) { showToast('Voeg eerst onderzoekers toe op het tabblad "Onderzoekers".', 'error'); return; }
  const months = getMonths(document.getElementById('p-start').value, document.getElementById('p-end').value);
  const used   = getUsedIds();
  const nextId = data ? data.id : researchers.find(r => !used.includes(r.id))?.id;
  if (!nextId) return;
  const div  = document.createElement('div'); div.className = 'rrow';
  const inputs = dayInputsHtml(months, data ? data.days : null);
  div.innerHTML = `
    <div><span class="col-label">Onderzoeker</span><select class="r-sel" onchange="refreshAllSelects()">${getAvailableOpts(nextId)}</select></div>
    <div>${months.length ? `<div class="days-grid">${inputs}</div>` : '<span class="hint">Vul eerst een start- en eindmaand in.</span>'}</div>
    <div class="del-col"><button class="btn btn-icon btn-danger" title="Verwijderen" onclick="this.closest('.rrow').remove();refreshAllSelects()"><i class="ti ti-trash"></i></button></div>`;
  document.getElementById('r-rows').appendChild(div);
  refreshAllSelects();
}

function rebuildMonthInputs() {
  [...document.querySelectorAll('.rrow')].forEach(row => {
    const selId = parseInt(row.querySelector('.r-sel').value);
    const existing = {};
    row.querySelectorAll('.d-inp').forEach(i => { if (i.value !== '') existing[i.dataset.ym] = parseFloat(i.value); });
    const months = getMonths(document.getElementById('p-start').value, document.getElementById('p-end').value);
    const inputs = dayInputsHtml(months, existing);
    const newRow = document.createElement('div'); newRow.className = 'rrow';
    newRow.innerHTML = `
      <div><span class="col-label">Onderzoeker</span><select class="r-sel" onchange="refreshAllSelects()">${getAvailableOpts(selId)}</select></div>
      <div>${months.length ? `<div class="days-grid">${inputs}</div>` : '<span class="hint">Vul eerst een start- en eindmaand in.</span>'}</div>
      <div class="del-col"><button class="btn btn-icon btn-danger" title="Verwijderen" onclick="this.closest('.rrow').remove();refreshAllSelects()"><i class="ti ti-trash"></i></button></div>`;
    row.replaceWith(newRow);
  });
}

function saveProject() {
  const name  = document.getElementById('p-name').value.trim();
  const start = document.getElementById('p-start').value;
  const end   = document.getElementById('p-end').value;
  if (!name)          { showToast('Vul een projectnaam in.', 'error'); return; }
  if (!start || !end) { showToast('Vul een start- en eindmaand in.', 'error'); return; }
  if (start > end)    { showToast('De eindmaand moet na de startmaand liggen.', 'error'); return; }
  const rows = [...document.querySelectorAll('.rrow')];
  if (!rows.length)   { showToast('Voeg minimaal één onderzoeker toe.', 'error'); return; }
  const rdata = rows.map(row => {
    const id = parseInt(row.querySelector('.r-sel').value);
    const days = {};
    row.querySelectorAll('.d-inp').forEach(i => { if (i.value !== '') days[i.dataset.ym] = parseFloat(i.value); });
    return { id, days };
  });
  if (editId) { Object.assign(projects.find(x => x.id === editId), { name, start, end, researchers: rdata }); }
  else        { projects.push({ id: Date.now(), name, start, end, researchers: rdata }); }
  save(); renderList(); cancelForm();
  showToast(editId ? 'Project bijgewerkt' : 'Project opgeslagen');
}

function deleteProject(id) {
  if (!confirm('Dit project verwijderen?')) return;
  projects = projects.filter(x => x.id !== id);
  save(); renderList();
}

function homeForm() {
  const home = document.getElementById('form-home');
  const form = document.getElementById('proj-form');
  if (home && form && form.parentElement !== home) home.appendChild(form);
}

function renderList() {
  const el = document.getElementById('proj-list'); if (!el) return;
  if (el.contains(document.getElementById('proj-form'))) homeForm();
  if (!projects.length) { el.innerHTML = '<div class="empty"><i class="ti ti-folder-open"></i>Nog geen projecten. Maak je eerste project aan om te beginnen.</div>'; return; }
  el.innerHTML = projects.map(p => `
    <div class="proj-card" data-id="${p.id}">
      <div style="flex:1;min-width:0">
        <span class="proj-name" title="${esc(p.name)}">${esc(shortName(p.name))}</span>
        <span class="badge">${p.researchers.length} onderzoeker${p.researchers.length!==1?'s':''}</span>
        <div class="proj-dates">${fmtYM(p.start)} – ${fmtYM(p.end)}</div>
      </div>
      <div style="display:flex;gap:6px;flex-shrink:0;margin-left:16px">
        <button class="btn btn-icon btn-ghost" title="Bewerken" onclick="openEdit(${p.id})"><i class="ti ti-pencil"></i></button>
        <button class="btn btn-icon btn-danger" title="Verwijderen" onclick="deleteProject(${p.id})"><i class="ti ti-trash"></i></button>
      </div>
    </div>`).join('');
}

/* ===== OVERZICHT ===== */
function renderOverview() {
  const el   = document.getElementById('ov-content');
  const from = document.getElementById('ov-from').value;
  const to   = document.getElementById('ov-to').value;
  if (!from || !to || from > to) { el.innerHTML = '<div class="empty"><i class="ti ti-calendar-off"></i>Kies een geldige periode.</div>'; return; }
  if (!projects.length)          { el.innerHTML = '<div class="empty"><i class="ti ti-folder-open"></i>Nog geen projecten om weer te geven.</div>'; return; }
  const months = getMonths(from, to);
  let html = '';

  // Per onderzoeker — beschikbare werkdagen per maand (werkdagen − vaste taken − projecten)
  if (researchers.length) {
    html += `<div class="sec-title">Per onderzoeker · beschikbare dagen</div>`;
    html += `<div class="legend"><span class="key"><span class="sw" style="background:var(--g-bg)"></span> 5+ dagen over</span><span class="key"><span class="sw" style="background:var(--a-bg)"></span> 2–5 dagen over</span><span class="key"><span class="sw" style="background:var(--r-bg)"></span> minder dan 2</span></div>`;
    html += `<div class="tbl-wrap"><table><thead><tr><th class="left">Onderzoeker</th>${months.map(m=>`<th class="${m===CUR_YM?'cur':''}">${fmtYM(m)}</th>`).join('')}<th>Totaal</th></tr></thead><tbody>`;
    const rMT = {}; months.forEach(m => rMT[m] = 0);
    researchers.forEach(r => {
      const base = monthlyWork(r) - fixedMonthly(r);
      let rowTotal = 0;
      const cells = months.map(m => {
        let proj = 0; projects.forEach(p => { const rx = p.researchers.find(x => x.id === r.id); if (rx && rx.days && rx.days[m]) proj += rx.days[m]; });
        const avail = base - proj;
        rMT[m] += avail; rowTotal += avail; return avail;
      });
      html += `<tr><td class="left">${esc(r.name)}</td>${cells.map((a,idx)=>`<td class="${months[idx]===CUR_YM?'cur':''}"><span class="pill ${availClass(a)}">${fmtNum(a)}</span></td>`).join('')}<td>${fmtNum(rowTotal)}</td></tr>`;
    });
    html += `<tr class="total-row"><td class="left">Totaal</td>${months.map(m=>`<td class="${m===CUR_YM?'cur':''}">${fmtNum(rMT[m])}</td>`).join('')}<td>${fmtNum(Object.values(rMT).reduce((a,b)=>a+b,0))}</td></tr>`;
    html += `</tbody></table></div>`;
  }

  // Per project
  html += `<div class="sec-title">Per project</div>`;
  html += `<div class="tbl-wrap"><table><thead><tr><th class="left">Project</th>${months.map(m=>`<th class="${m===CUR_YM?'cur':''}">${fmtYM(m)}</th>`).join('')}<th>Totaal</th></tr></thead><tbody>`;
  const pMT = {}; months.forEach(m => pMT[m] = 0);
  projects.forEach(p => {
    const projMonths = getMonths(p.start, p.end); let rowTotal = 0;
    const cells = months.map(m => {
      if (!projMonths.includes(m)) return {d:0, active:false};
      let d = 0; p.researchers.forEach(r => { if (r.days && r.days[m]) d += r.days[m]; });
      pMT[m] += d; rowTotal += d; return {d, active:true};
    });
    html += `<tr><td class="left" title="${esc(p.name)}">${esc(shortName(p.name))}</td>${cells.map(({d,active},idx)=>`<td class="${[!active?'inactive':'', months[idx]===CUR_YM?'cur':''].filter(Boolean).join(' ')}">${active?(d>0?d:'0'):'—'}</td>`).join('')}<td>${rowTotal}</td></tr>`;
  });
  html += `<tr class="total-row"><td class="left">Totaal</td>${months.map(m=>`<td class="${m===CUR_YM?'cur':''}">${pMT[m]||''}</td>`).join('')}<td>${Object.values(pMT).reduce((a,b)=>a+b,0)}</td></tr>`;
  html += `</tbody></table></div>`;

  el.innerHTML = html;
}

document.querySelectorAll('input[type="month"]').forEach(el => {
  el.addEventListener('click', () => { if (el.showPicker) { try { el.showPicker(); } catch (e) {} } });
});

load();
</script>
</body>
</html>
